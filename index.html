<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados Subnacionales 2026 - Bolivia</title>

    <!-- Meta tags para SEO -->
    <meta name="description"
        content="Mapa interactivo de los resultados de las elecciones municipales de alcalde en Bolivia 2026. Visualiza datos por recintos y distritos.">
    <meta name="keywords"
        content="Bolivia, elecciones, 2026, municipales, alcalde, Cochabamba, La Paz, Santa Cruz, resultados electorales, mapa electoral">
    <meta name="author" content="Lab TecnoSocial">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lab-tecnosocial.github.io/resultados-sub2026/">
    <meta property="og:title" content="Resultados Municipales Bolivia 2026">
    <meta property="og:description"
        content="Mapa interactivo de los resultados de las elecciones municipales de alcalde en Bolivia 2026. Visualiza datos por recintos y distritos.">
    <meta property="og:image" content="https://lab-tecnosocial.github.io/resultados-sub2026/preview2.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://lab-tecnosocial.github.io/resultados-sub2026/">
    <meta property="twitter:title" content="Resultados Municipales Bolivia 2026">
    <meta property="twitter:description"
        content="Mapa interactivo de los resultados de las elecciones municipales de alcalde en Bolivia 2026. Visualiza datos por recintos y distritos.">
    <meta property="twitter:image" content="https://lab-tecnosocial.github.io/resultados-sub2026/preview2.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="style.css?v=1775857087923">
</head>

<body>
    <div id="map"></div>

    <div class="controls-container">
        <h2 class="controls-title">Mapa de resultados electorales</h2>
        <p id="controls-subtitle" class="controls-subtitle">Bolivia - Alcaldias 2026</p>
        <p class="controls-info">Busca un municipio o partido</p>
        <div class="selector-wrapper search-wrapper">
            <label for="municipality-search">Municipio</label>
            <div class="search-input-container">
                <input type="text" id="municipality-search" placeholder="Buscar municipio..." autocomplete="off"
                    spellcheck="false">
                <div id="search-results" class="search-results" style="display:none;"></div>
            </div>
        </div>
        <div id="party-search-wrapper" class="selector-wrapper">
            <label for="party-select">Partido</label>
            <select id="party-select">
                <option value="">Todos los partidos</option>
            </select>
        </div>
        <div id="layer-select-wrapper" class="selector-wrapper">
            <label for="layer-select">Seleccionar capa</label>
            <select id="layer-select">
                <option value="recintos">Recintos (ganador)</option>
                <option value="recintosPie">Recintos (distribución)</option>
                <option value="distritos">Distritos</option>
            </select>
        </div>
    </div>

    <div id="legend" class="legend"></div>

    <div class="credit">
        <div>Desarrollado por <a href="https://labtecnosocial.org/" target="_blank" rel="noopener noreferrer"><img
                    src="logo-lab.webp" alt="Lab TecnoSocial" style="height:24px;vertical-align:middle;"></a></div>
        <div><a href="fuentes.html">Fuentes de datos</a></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <script src="app.js?v=1775857087923"></script>
</body>

</html>
